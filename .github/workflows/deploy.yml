name: CI / Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  deploy-staging:
    if: github.ref == 'refs/heads/develop' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: deploy-staging
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build web (staging)
        env:
          VITE_WS_URL: wss://api.teijitaisha-web-staging.mottainaigames.com
          VITE_ENV: staging
          VITE_APP_URL: https://teijitaisha-web-staging.mottainaigames.com
        run: pnpm build:web

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=teijitaisha-web-staging --branch=develop

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Verify Fly token
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::error::FLY_API_TOKEN is empty. Add it to Environment staging (name must be exactly FLY_API_TOKEN)."
            exit 1
          fi
          echo "FLY_API_TOKEN is set (${#FLY_API_TOKEN} chars)"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy server to Fly.io (staging)
        run: flyctl deploy --config fly.staging.toml --remote-only --app teijitaisha-web-api-staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-production:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build web (production)
        env:
          VITE_WS_URL: wss://api.teijitaisha-web.mottainaigames.com
          VITE_ENV: production
          VITE_APP_URL: https://teijitaisha-web.mottainaigames.com
        run: pnpm build:web

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=teijitaisha-web --branch=main

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Verify Fly token
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::error::FLY_API_TOKEN is empty. Add it to Environment production (name must be exactly FLY_API_TOKEN)."
            exit 1
          fi
          echo "FLY_API_TOKEN is set (${#FLY_API_TOKEN} chars)"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy server to Fly.io (production)
        run: flyctl deploy --config fly.toml --remote-only --app teijitaisha-web-api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
